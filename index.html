<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎂 Birthday Surprise!</title>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width: 100%;
  height: 100%;
}

body {
  height: 100vh;
  background: radial-gradient(ellipse at 50% 30%, #0a2e55 0%, #001020 70%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  font-family: 'Nunito', sans-serif;
  overflow-y: auto;   /* allow scroll on very small screens */
}

/* ── Stars ── */
#stars { position:fixed; inset:0; pointer-events:none; z-index:0; }
.star {
  position:absolute; background:#fff; border-radius:50%;
  animation: twinkle var(--d,2s) ease-in-out infinite alternate;
}
@keyframes twinkle { from{opacity:.08} to{opacity:.95} }

/* ── Scene: vertically fills viewport ── */
#scene {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100%;
  min-height: 100vh;
  padding: 16px;
  gap: 8px;
}
/* ── Headline ── */
.headline {
  font-family: 'Boogaloo', cursive;
  font-size: clamp(1.4rem, 4vw, 2.5rem);
  color: #fff;
  text-shadow: 0 0 20px #7fb8ff, 0 0 50px #7fb8ff;
  letter-spacing: 2px;
  text-align: center;
  margin-bottom: 8px;
  animation: hfloat 3s ease-in-out infinite;
  flex-shrink: 0;
  position: relative;  /* add this */
  z-index: 10;    
}
@keyframes hfloat {
  0%,100%{ transform:translateY(0); }
  50%    { transform:translateY(-6px); }
}

/* ── Egg + person container ──
   This box is bigger than the canvas so the face can pop above it */
#eggOuter {
  position: relative;
  width: min(340px, 90vw);
  height: min(380px, 55vw);
  flex-shrink: 0;
  display: flex;
  align-items: flex-end;
  justify-content: center;
}

#eggCanvas {
  width: min(220px, 60vw);
  height: min(280px, 75vw);
  display: block;
  cursor: pointer;
  position: relative;
  z-index: 2;
}
/* ── Person: hidden until crack, pops straight up ── */
#personPop {
  position: absolute;
  bottom: 60px;       /* start inside egg */
  left: 50%;
  transform: translateX(-50%) scale(0);
  opacity: 0;
  pointer-events: none;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  transform-origin: bottom center;
}
#personPop.show {
  animation: burstUp .72s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
@keyframes burstUp {
  0%   { opacity:0; transform:translateX(-50%) translateY(40px) scale(0); }
  55%  { opacity:1; transform:translateX(-50%) translateY(-130px) scale(1.18); }
  72%  { transform:translateX(-50%) translateY(-110px) scale(0.93); }
  86%  { transform:translateX(-50%) translateY(-118px) scale(1.06); }
  100% { opacity:1; transform:translateX(-50%) translateY(-115px) scale(1); }
}

.face-ring {
  width: 118px;
  height: 118px;
  border-radius: 50%;
  border: 5px solid #7fb8ff;
  box-shadow:
    0 0 0 4px #fff,
    0 0 28px rgba(127,184,255,.9),
    0 0 60px rgba(127,184,255,.4);
  background: linear-gradient(135deg, #d6eaff, #b8d4ff);
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 58px;
  animation: faceWiggle .5s ease-in-out infinite alternate;
}
@keyframes faceWiggle {
  from { transform: rotate(-5deg) scale(1); }
  to   { transform: rotate(5deg) scale(1.06); }
}
.face-ring img {
  width: 100%; height: 100%;
  object-fit: cover;
  border-radius: 50%;
}

/* ── Speech bubble follows face ── */
#bubble {
  position: absolute;
  bottom: calc(60px + 120px + 20px); /* above final face position */
  left: 50%;
  transform: translateX(-50%) scale(0);
  opacity: 0;
  background: #fff;
  border-radius: 16px;
  padding: 9px 14px;
  font-family: 'Boogaloo', cursive;
  font-size: .95rem;
  color: #0055cc;
  white-space: nowrap;
  box-shadow: 0 4px 18px rgba(127,184,255,.5);
  z-index: 15;
  pointer-events: none;
}
#bubble::after {
  content: '';
  position: absolute;
  top: 100%; left: 50%;
  transform: translateX(-50%);
  border: 8px solid transparent;
  border-top-color: #fff;
}
#bubble.show {
  animation: bubbleIn .45s .4s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
@keyframes bubbleIn {
  from { opacity:0; transform:translateX(-50%) scale(0); }
  to   { opacity:1; transform:translateX(-50%) scale(1); }
}

/* ── Click button ── */
#clickBtn {
  margin-top: 14px;
  background: linear-gradient(135deg, #7fb8ff, #1a6eff);
  border: none;
  border-radius: 60px;
  padding: clamp(10px, 3vw, 14px) clamp(24px, 8vw, 44px);
  font-family: 'Boogaloo', cursive;
  font-size: clamp(1rem, 4vw, 1.45rem);
  color: #fff;
  cursor: pointer;
  letter-spacing: 1px;
  animation: btnPulse 1.6s ease-in-out infinite;
  transition: transform .15s;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}
#clickBtn:hover  { transform: scale(1.07); }
#clickBtn:active { transform: scale(.96); }
#clickBtn.gone   { visibility: hidden; pointer-events: none; }
@keyframes btnPulse {
  0%,100%{ box-shadow: 0 8px 28px rgba(127,184,255,.5); }
  50%    { box-shadow: 0 8px 52px rgba(127,184,255,.9); }
}

/* ── Big birthday message ── */
#bigMsg {
  margin-top: 12px;
  font-family: 'Boogaloo', cursive;
  font-size: clamp(1.2rem, 3.8vw, 2.2rem);
  color: #fff;
  text-align: center;
  text-shadow: 0 0 18px #7fb8ff, 0 0 40px #7fb8ff;
  opacity: 0;
  transform: scale(.5);
  line-height: 1.4;
  max-width: 460px;
  padding: 0 16px;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}
#bigMsg.show {
  animation: msgIn .6s 1.4s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
@keyframes msgIn {
  from { opacity:0; transform:scale(.5); }
  to   { opacity:1; transform:scale(1); }
}

/* ── Reset button ── */
#resetBtn {
  margin-top: 10px;
  background: transparent;
  border: 2px solid rgba(255,255,255,.35);
  border-radius: 30px;
  padding: 8px 26px;
  color: rgba(255,255,255,.75);
  font-family: 'Nunito', sans-serif;
  font-size: .9rem;
  cursor: pointer;
  opacity: 0;
  pointer-events: none;
  transition: opacity .4s, background .2s;
  flex-shrink: 0;
}
#resetBtn:hover { background: rgba(255,255,255,.1); }
#resetBtn.show  { opacity:1; pointer-events:auto; }

/* ── Confetti / emojis ── */
.cf {
  position: fixed;
  top: -18px;
  pointer-events: none;
  z-index: 200;
  border-radius: 2px;
  animation: cfFall var(--fd) var(--fdd) ease-in forwards;
}
@keyframes cfFall {
  0%   { transform:translateY(0) rotate(0deg) scaleX(1); opacity:1; }
  100% { transform:translateY(110vh) rotate(var(--fr)) scaleX(-1); opacity:.3; }
}
.emoji-fly {
  position: fixed;
  font-size: 2rem;
  top: -50px;
  pointer-events: none;
  z-index: 5;  /* lower than scene content */
  animation: emjFall var(--ed) var(--edd) linear forwards;
}
@keyframes emjFall {
  to { transform:translateY(115vh) rotate(360deg); opacity:0; }
}
</style>
</head>
<body>

<div id="stars"></div>

<div id="scene">

  <div class="headline">🥚An egg-citing message awaits inside.!🥚</div>

  <!-- Egg canvas + person overlay in one container -->
  <div id="eggOuter">
    <canvas id="eggCanvas" width="440" height="560" onclick="handleClick()"></canvas>

    <!-- Person pops up through the crack — hidden until crack -->
    <div id="personPop">
      <div class="face-ring" id="faceRing">
        <!-- Image goes here — replace src with your photo path -->
        <img id="faceImg" src="imageface.png" alt="Birthday person"
          onerror="this.style.display='none'; document.getElementById('faceRing').textContent='😝';">
      </div>
    </div>

    <!-- Speech bubble above face -->
    <!-- <div id="bubble">SURPRISE! 🥚💥 HAPPY BIRTHDAY!</div> -->
  </div>

  <button id="clickBtn" onclick="handleClick()">🥚 Crack Me Open! 🥚</button>

  <div id="bigMsg">Happy Birthday da Rhithik ehhh! Nee age aagura speed  vida un ragebaiting skills dhaan perusa aagudhu. 🐒🥳</div>

  <button id="resetBtn" onclick="doReset()">🔄 Again!</button>
</div>

<script>
/* ════════ STARS ════════ */
const starsEl = document.getElementById('stars');
for (let i = 0; i < 100; i++) {
  const s = document.createElement('div'); s.className = 'star';
  const sz = Math.random() * 2.8 + 0.8;
  s.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${(Math.random()*2.5+0.8).toFixed(1)}s;animation-delay:${(Math.random()*3).toFixed(1)}s`;
  starsEl.appendChild(s);
}

/* ════════ EGG CANVAS ════════ */
const canvas = document.getElementById('eggCanvas');
const ctx    = canvas.getContext('2d');
const W = 440, H = 560;

const CX = 220, CY = 310;
const RX = 140, RY_T = 158, RY_B = 198;

function eggPath(c) {
  c.beginPath();
  c.ellipse(CX, CY, RX, RY_T, 0, Math.PI, 0);
  c.ellipse(CX, CY, RX, RY_B, 0, 0, Math.PI);
  c.closePath();
}

function drawEgg(c) {
  c.save();

  // Ground shadow
  c.save();
  c.translate(CX, CY + RY_B - 10); c.scale(1, 0.2);
  const sg = c.createRadialGradient(0,0,10, 0,0,RX+14);
  sg.addColorStop(0,'rgba(0,0,0,0.4)'); sg.addColorStop(1,'rgba(0,0,0,0)');
  c.fillStyle = sg; c.beginPath(); c.arc(0,0,RX+14,0,Math.PI*2); c.fill();
  c.restore();

  // Base colour
  eggPath(c);
  const g = c.createRadialGradient(CX-55,CY-80,18, CX+20,CY+40,RX*1.72);
  g.addColorStop(0.00,'#fffef5'); g.addColorStop(0.12,'#fef7db');
  g.addColorStop(0.30,'#f5e098'); g.addColorStop(0.54,'#e6b84e');
  g.addColorStop(0.76,'#c28620'); g.addColorStop(1.00,'#8a5510');
  c.fillStyle = g; c.fill();

  // Speckles
  c.save(); eggPath(c); c.clip();
  for (let i = 0; i < 65; i++) {
    const bx = CX + (Math.random()-.5)*RX*1.82;
    const by = CY + (Math.random()-.5)*(RY_T+RY_B)*0.9;
    const r  = Math.random()*4.5+0.6;
    c.globalAlpha = Math.random()*.22+.04;
    c.fillStyle   = Math.random()>.5 ? '#6b3d00' : '#c8a060';
    c.beginPath(); c.arc(bx,by,r,0,Math.PI*2); c.fill();
  }
  c.globalAlpha = 1; c.restore();

  // Specular highlight
  c.save(); eggPath(c); c.clip();
  const hg = c.createRadialGradient(CX-62,CY-90,4, CX-40,CY-60,84);
  hg.addColorStop(0,'rgba(255,255,255,0.65)');
  hg.addColorStop(.5,'rgba(255,255,255,0.18)');
  hg.addColorStop(1,'rgba(255,255,255,0)');
  c.fillStyle = hg; eggPath(c); c.fill();
  c.restore();

  // Rim shading
  c.save(); eggPath(c); c.clip();
  const rg = c.createRadialGradient(CX,CY,RX*.38, CX,CY,RX*1.08);
  rg.addColorStop(0,'rgba(0,0,0,0)'); rg.addColorStop(1,'rgba(0,0,0,0.32)');
  c.fillStyle = rg; eggPath(c); c.fill();
  c.restore();

  // Outline
  eggPath(c);
  c.strokeStyle = 'rgba(90,50,0,0.38)'; c.lineWidth = 2.5; c.stroke();

  c.restore();
}

/* ── Crack lines ── */
const CRACK_CHAINS = [
  [{x:220,y:100},{x:204,y:132},{x:228,y:160},{x:206,y:188},{x:232,y:216},{x:214,y:242}],
  [{x:204,y:132},{x:178,y:149},{x:160,y:167},{x:150,y:182}],
  [{x:228,y:160},{x:258,y:152},{x:280,y:168},{x:290,y:186},{x:278,y:202}],
  [{x:206,y:188},{x:188,y:202},{x:180,y:218}],
  [{x:232,y:216},{x:256,y:226},{x:270,y:240}],
  [{x:220,y:100},{x:240,y:118},{x:252,y:138}],
  [{x:178,y:149},{x:162,y:137}],
];
const ALL_SEGS = [];
CRACK_CHAINS.forEach(pts => {
  for (let i = 0; i < pts.length-1; i++) ALL_SEGS.push([pts[i], pts[i+1]]);
});

function drawCracks(progress) {
  const total = ALL_SEGS.length;
  const show  = progress * total;
  ctx.save(); eggPath(ctx); ctx.clip();
  for (let i = 0; i < total; i++) {
    const frac = Math.min(Math.max(show - i, 0), 1);
    if (frac <= 0) break;
    const [a, b] = ALL_SEGS[i];
    const mx = a.x + (b.x-a.x)*frac, my = a.y + (b.y-a.y)*frac;
    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(mx,my);
    ctx.strokeStyle = 'rgba(0,0,0,0.75)'; ctx.lineWidth = 4.5; ctx.lineCap = 'round'; ctx.stroke();
    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(mx,my);
    ctx.strokeStyle = 'rgba(20,8,0,0.95)'; ctx.lineWidth = 2; ctx.stroke();
    ctx.beginPath(); ctx.moveTo(a.x+1.2,a.y+1); ctx.lineTo(mx+1.2,my+1);
    ctx.strokeStyle = 'rgba(255,225,145,0.55)'; ctx.lineWidth = 1.1; ctx.stroke();
  }
  ctx.restore();
}

/* ── Shells fly apart ── */
function drawShellsOpen(prog) {
  const e = 1 - Math.pow(1-prog, 3);
  const fd = e * 210;
  const alpha = 1 - e * 0.82;

  // Left shell
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(-fd*0.88, -fd*0.3);
  ctx.translate(CX,CY); ctx.rotate(-e*0.72); ctx.translate(-CX,-CY);
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(CX,CY,RX,RY_T,0,Math.PI,0);
  ctx.lineTo(CX,CY); ctx.closePath(); ctx.clip();
  drawEgg(ctx);
  ctx.beginPath(); ctx.ellipse(CX,CY+8,RX-20,RY_T-20,0,Math.PI,0);
  ctx.fillStyle='rgba(255,255,245,0.82)'; ctx.fill();
  ctx.restore(); ctx.restore();

  // Right shell
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(fd*0.88, fd*0.3);
  ctx.translate(CX,CY); ctx.rotate(e*0.72); ctx.translate(-CX,-CY);
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(CX,CY,RX,RY_B,0,0,Math.PI);
  ctx.lineTo(CX,CY); ctx.closePath(); ctx.clip();
  drawEgg(ctx);
  ctx.beginPath(); ctx.ellipse(CX,CY-6,RX-20,RY_B-20,0,0,Math.PI);
  ctx.fillStyle='rgba(255,255,245,0.82)'; ctx.fill();
  ctx.restore(); ctx.restore();

  ctx.globalAlpha = 1;
}

/* ════════ STATE MACHINE ════════ */
let state='idle', crackProg=0, shellProg=0, wobT=0;
let animId=null, crackId=null, shakeId=null, shakeT=0, clicked=false;

function render() {
  ctx.clearRect(0,0,W,H);
  if (state==='idle') {
    ctx.save();
    ctx.translate(CX,CY); ctx.rotate(Math.sin(wobT)*0.036); wobT+=0.036;
    ctx.translate(-CX,-CY); drawEgg(ctx); ctx.restore();
    animId = requestAnimationFrame(render);
  } else if (state==='cracking') {
    drawEgg(ctx); drawCracks(crackProg);
  } else if (state==='cracked') {
    drawEgg(ctx); drawCracks(1);
  } else if (state==='opening' || state==='open') {
    drawShellsOpen(shellProg);
  }
}
render();

function shakeEgg(onDone) {
  if (shakeId) return;
  shakeT = 0;
  function sf() {
    shakeT += 0.36;
    ctx.clearRect(0,0,W,H);
    const sx = Math.sin(shakeT)*18*Math.max(0, 1-shakeT/7.5);
    ctx.save(); ctx.translate(sx,0);
    drawEgg(ctx);
    if (crackProg > 0) drawCracks(crackProg);
    ctx.restore();
    if (shakeT < 7.5) shakeId = requestAnimationFrame(sf);
    else { shakeId=null; render(); if(onDone) onDone(); }
  }
  shakeId = requestAnimationFrame(sf);
}

function startCracking() {
  function step() {
    crackProg = Math.min(crackProg + 0.024, 1);
    render();
    if (crackProg < 1) crackId = requestAnimationFrame(step);
    else { state='cracked'; render(); shakeEgg(()=>setTimeout(openEgg,160)); }
  }
  step();
}

function openEgg() {
  state = 'opening';
  // Face and bubble burst out IMMEDIATELY
  document.getElementById('personPop').classList.add('show');
  // document.getElementById('bubble').classList.add('show');
  launchConfetti(); launchEmojis();

  const t0 = performance.now(), dur = 680;
  function step(now) {
    const t = Math.min((now-t0)/dur, 1);
    shellProg = 1 - Math.pow(1-t, 3);
    render();
    if (t < 1) requestAnimationFrame(step);
    else {
      state = 'open';
      document.getElementById('bigMsg').classList.add('show');
      setTimeout(()=>document.getElementById('resetBtn').classList.add('show'), 2000);
      setTimeout(launchConfetti, 700);
      setTimeout(()=>{launchConfetti();launchEmojis();}, 1600);
    }
  }
  requestAnimationFrame(step);
}

function handleClick() {
  if (clicked || state==='opening' || state==='open') return;
  clicked = true;
  document.getElementById('clickBtn').classList.add('gone');
  if (animId) { cancelAnimationFrame(animId); animId=null; }
  state = 'cracking';
  shakeEgg(()=>startCracking());
}

/* ════════ CONFETTI ════════ */
const CF = ['#7fb8ff','#1a6eff','#ffe44d','#ff6b6b','#6bffb8','#fff','#ffb347','#b8ff6b'];
const EM = ['🎉','🎂','🎈','✨','🥳','🎁','🍰','💫','🐣','🎊'];

function launchConfetti() {
  for (let i = 0; i < 130; i++) {
    const c = document.createElement('div'); c.className = 'cf';
    c.style.cssText = `left:${Math.random()*100}vw;width:${Math.random()*14+5}px;height:${Math.random()*14+5}px;background:${CF[Math.floor(Math.random()*CF.length)]};border-radius:${Math.random()>.45?'50%':'2px'};--fd:${(Math.random()*2.2+1.8).toFixed(1)}s;--fdd:${(Math.random()*1.4).toFixed(2)}s;--fr:${Math.floor(Math.random()*720-360)}deg;`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(), 5000);
  }
}
function launchEmojis() {
  for (let i = 0; i < 20; i++) {
    const e = document.createElement('div'); e.className = 'emoji-fly';
    e.textContent = EM[Math.floor(Math.random()*EM.length)];
    e.style.cssText = `left:${Math.random()*100}vw;--ed:${(Math.random()*3+2).toFixed(1)}s;--edd:${(Math.random()*2).toFixed(1)}s`;
    document.body.appendChild(e);
    setTimeout(()=>e.remove(), 6500);
  }
}

/* ════════ RESET ════════ */
function doReset() {
  clicked=false; crackProg=0; shellProg=0; wobT=0;
  if(animId){cancelAnimationFrame(animId);animId=null;}
  if(crackId){cancelAnimationFrame(crackId);crackId=null;}
  if(shakeId){cancelAnimationFrame(shakeId);shakeId=null;}
  state='idle';
  ['personPop','bigMsg','resetBtn'].forEach(id=>document.getElementById(id).classList.remove('show'));
  document.getElementById('clickBtn').classList.remove('gone');
  render();
}
</script>
</body>
</html>
